name: Run Spread Bot

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Bot
        run: python moex_bot.py
        env:
          VK_GROUP_TOKEN: ${{ secrets.VK_GROUP_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
          VK_USER_ID: ${{ secrets.VK_USER_ID }}
      
      # 🧠 СОХРАНЕНИЕ ПАМЯТИ
      - name: Save History
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "GitHub Bot"
          git add bond_history.json
          git diff --staged --quiet || git commit -m "Update bot history"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
