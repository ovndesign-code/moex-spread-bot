name: Run Spread Bot
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: bond_history.json
          key: ${{ runner.os }}-bond-history
      - run: pip install -r requirements.txt
      - run: python moex_bot.py
